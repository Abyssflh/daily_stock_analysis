name: 每日股票分析

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 检查 Secrets
        run: |
          echo "检查环境变量..."
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "❌ OPENAI_API_KEY 未设置"
          else
            echo "✅ OPENAI_API_KEY 已设置"
          fi
          
          if [ -z "${{ secrets.WECHAT_WEBHOOK_URL }}" ]; then
            echo "❌ WECHAT_WEBHOOK_URL 未设置"
          else
            echo "✅ WECHAT_WEBHOOK_URL 已设置"
          fi
      
      - name: 测试企业微信推送
        run: |
          if [ -n "${{ secrets.WECHAT_WEBHOOK_URL }}" ]; then
            echo "测试发送消息到企业微信..."
            curl -X POST ${{ secrets.WECHAT_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d '{"msgtype": "text", "text": {"content": "GitHub Actions 测试消息\n时间：'$(date)'\n状态：配置成功"}}' \
              -v
          else
            echo "⚠️ WECHAT_WEBHOOK_URL 未设置，跳过测试"
          fi
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          SCHEDULE_RUN_IMMEDIATELY: true
          DEBUG: true
        run: |
          python main.py --stocks 600519 --force-run --notify 2>&1
