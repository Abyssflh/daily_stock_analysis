name: 手动触发股票分析

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: 运行股票分析
      env:
        LLM_CHANNELS: zhizengzeng
        LLM_ZHIZENGZENG_PROTOCOL: openai
        LLM_ZHIZENGZENG_BASE_URL: https://api.zhizengzeng.com/v1
        LLM_ZHIZENGZENG_API_KEY: ${{ secrets.ZHIZENGZENG_API_KEY }}
        LLM_ZHIZENGZENG_MODELS: deepseek-reasoner
        LLM_TEMPERATURE: 1.0
        STOCK_LIST: ${{ secrets.STOCK_LIST || '600519,300750' }}
        REPORT_TYPE: full
        SCHEDULE_ENABLED: false
        SCHEDULE_RUN_IMMEDIATELY: true
        
      run: python main.py --stocks 600519 --no-notify
