name: 每日股票分析

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 创建必要目录
        run: mkdir -p data logs reports
      
      - name: 执行股票分析
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: markdown
          SCHEDULE_RUN_IMMEDIATELY: true
        run: |
          echo "开始分析..."
          python main.py --stocks 600519 --force-run
        continue-on-error: true
      
      - name: 发送报告到企业微信
        if: always()
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        run: |
          if [ -f reports/stock_analysis_*.md ]; then
            echo "找到报告文件，发送中..."
            python -c "
import requests
import os
import glob

webhook = os.getenv('WECHAT_WEBHOOK_URL')
if not webhook:
    print('⚠️ WECHAT_WEBHOOK_URL not set')
    exit(0)

# 读取最新的报告
files = glob.glob('reports/stock_analysis_*.md')
if files:
    files.sort(key=os.path.getmtime, reverse=True)
    with open(files[0], 'r', encoding='utf-8') as f:
        content = f.read()[:4000]  # 限制长度
    
    data = {
        'msgtype': 'markdown',
        'markdown': {'content': content}
    }
    
    resp = requests.post(webhook, json=data)
    print(f'Status: {resp.status_code}')
    print(f'Response: {resp.text}')
else:
    print('⚠️ No report files found')
"
          else
            echo "⚠️ 未找到报告文件"
          fi
